<!doctype html>
<html lang="en">
<meta charset="utf-8">
<title>Smart Group Select Icons</title>
<style>
  body {
    margin: 0;
    padding: 32px;
    background: #1b1d21;
    color: #d8dde4;
    font-family: Arial, sans-serif;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 120px);
    gap: 24px;
  }
  .item {
    display: grid;
    gap: 10px;
    justify-items: center;
    font-size: 12px;
    text-align: center;
  }
  img {
    width: 64px;
    height: 64px;
    image-rendering: auto;
  }
</style>
<div class="grid">
  <div class="item"><img src="mark-selected-nulls.svg" alt=""><span>Mark Nulls</span></div>
  <div class="item"><img src="remove-from-selected.svg" alt=""><span>Remove Tag</span></div>
  <div class="item"><img src="global-enable.svg" alt=""><span>Global Enable</span></div>
  <div class="item"><img src="toggle-selected-groups.svg" alt=""><span>Toggle Group</span></div>
</div>
